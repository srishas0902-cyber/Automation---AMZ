[pytest]
# ── Parallel execution ────────────────────────────────────────────────────────
# Run both test cases simultaneously with 2 workers.
# Increase -n if you add more test files.
addopts = -v -n 2 --tb=short

# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests

# ── Output ────────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
